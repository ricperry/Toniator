<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="384" height="384" viewBox="0 0 384 384" role="img" aria-labelledby="title desc">
  <title id="title">RGB additive screen channels</title>
  <desc id="desc">Red, green, and blue halftone dots overlap on a dark screen to make luminous additive colour.</desc>
  <rect width="384" height="384" rx="28" fill="#10131a"/>
  <g fill="#ff3b4f" opacity=".88">
    <circle cx="118" cy="132" r="42"/><circle cx="118" cy="226" r="42"/><circle cx="198" cy="179" r="42"/>
  </g>
  <g fill="#45e06f" opacity=".82">
    <circle cx="202" cy="132" r="42"/><circle cx="202" cy="226" r="42"/><circle cx="118" cy="179" r="42"/>
  </g>
  <g fill="#4b86ff" opacity=".82">
    <circle cx="160" cy="92" r="42"/><circle cx="160" cy="266" r="42"/><circle cx="246" cy="179" r="42"/>
  </g>
  <g fill="#fff" font-family="sans-serif" font-size="22" font-weight="700" text-anchor="middle">
    <text x="118" y="345">RED</text><text x="202" y="345">GREEN</text><text x="288" y="345">BLUE</text>
  </g>
</svg>
